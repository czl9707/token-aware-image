name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release Type"
        required: true
        type: choice
        default: "patch"
        options:
          - major
          - minor
          - patch

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: token-image
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: token-image/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Version bump
        run: "npm version ${{ inputs.release_type }} -m 'chore(release): %s'"

      - name: Publish
        run: npm publish --access public

      - name: Push version commit and tag
        run: git push origin HEAD:${{ github.ref_name }}
